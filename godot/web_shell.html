<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>$GODOT_PROJECT_NAME</title>
	<style>
		html, body { padding: 0; margin: 0; }
		body { background: #0f0f0f; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
		#canvas { display: block; outline: none; image-rendering: pixelated; image-rendering: crisp-edges; }

		#status {
			position: absolute; left: 0; top: 0; right: 0; bottom: 0;
			display: flex; flex-direction: column; align-items: center; justify-content: center;
			background: #0f0f0f; z-index: 10;
			pointer-events: none;
		}
		#status-title {
			font-size: 42px; font-weight: 600; letter-spacing: 6px;
			color: #f5f5f5; margin-bottom: 12px;
		}
		#status-sub { font-size: 13px; color: #888; margin-bottom: 22px; }
		#status-progress {
			-webkit-appearance: none; appearance: none;
			width: 220px; height: 6px; border: none;
			background: #222; border-radius: 3px; overflow: hidden;
		}
		#status-progress::-webkit-progress-bar { background: #222; }
		#status-progress::-webkit-progress-value { background: #6b8f4d; }
		#status-progress::-moz-progress-bar { background: #6b8f4d; }
		#status-notice {
			margin-top: 12px; font-size: 12px; color: #c66;
			max-width: 80vw; text-align: center; white-space: pre-line;
		}
	</style>
	$GODOT_HEAD_INCLUDE
</head>
<body>
	<canvas id="canvas">Your browser does not support the canvas tag.</canvas>
	<noscript>Your browser does not support JavaScript.</noscript>

	<div id="status">
		<div id="status-title">GG</div>
		<div id="status-sub">Загрузка…</div>
		<progress id="status-progress"></progress>
		<div id="status-notice"></div>
	</div>

	<script src="$GODOT_URL"></script>
	<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusBox = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const statusSub = document.getElementById('status-sub');

	let initializing = true;

	function setStatusMode(mode) {
		if (mode === 'hidden') {
			statusBox.style.display = 'none';
			return;
		}
		statusBox.style.display = 'flex';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
	}

	function setStatusNotice(text) {
		statusNotice.textContent = text;
		statusSub.style.display = text ? 'none' : 'block';
	}

	function displayFailureNotice(err) {
		setStatusMode('notice');
		setStatusNotice(err);
		console.error(err);
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			Promise.race([
				navigator.serviceWorker.getRegistration().then(reg => reg ? reg.update() : Promise.resolve()).then(() => Promise.reject('Service worker updated.')),
				new Promise(r => setTimeout(r, 2000)),
			]).then(() => {
				displayFailureNotice('Браузер не поддерживает: ' + missing.join(', '));
			}, err => {
				console.error('Error while updating service worker:', err);
				displayFailureNotice('Браузер не поддерживает: ' + missing.join(', '));
			});
		} else {
			displayFailureNotice('Браузер не поддерживает: ' + missing.join(', '));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			initializing = false;
		}, displayFailureNotice);
	}
}());
	</script>
</body>
</html>
