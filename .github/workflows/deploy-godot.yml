name: Deploy Godot client to VPS

on:
  push:
    branches: [main]
    paths:
      - "godot/**"
      - ".github/workflows/deploy-godot.yml"
  workflow_dispatch:

concurrency:
  group: deploy-godot
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.4"
  GODOT_TAG: "4.4-stable"

jobs:
  export-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary + templates
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: |
            /opt/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_TAG }}

      - name: Install Godot ${{ env.GODOT_TAG }}
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p /opt/godot
          wget -q -O /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /opt/godot
          mv /opt/godot/Godot_v${GODOT_TAG}_linux.x86_64 /opt/godot/godot
          chmod +x /opt/godot/godot
          wget -q -O /tmp/templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_export_templates.tpz"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"
          unzip -q /tmp/templates.tpz -d /tmp/templates-extract
          mv /tmp/templates-extract/templates/* "$TEMPLATE_DIR"/

      - name: List templates
        run: |
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/" || true

      - name: Sync world map
        run: |
          mkdir -p godot/assets
          cp data/maps/world.tmj godot/assets/world.tmj

      - name: Import project
        run: |
          cd godot
          /opt/godot/godot --headless --import --verbose 2>&1 | tail -60 || true

      - name: Export Web build
        run: |
          cd godot
          mkdir -p dist
          /opt/godot/godot --headless --export-release "Web" dist/index.html --verbose 2>&1 | tail -80
          echo --- result ---
          ls -la dist/

      - name: Sync build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "godot/dist/*"
          target: "/srv/gg-godot-staging"
          strip_components: 2
          rm: true

      - name: Swap on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /srv/gg-godot
            rm -rf /srv/gg-godot/*
            cp -r /srv/gg-godot-staging/* /srv/gg-godot/
            rm -rf /srv/gg-godot-staging
            ls /srv/gg-godot/
