name: Deploy server to VPS

on:
  push:
    branches: [main]
    paths:
      - "deploy/**"
      - "nakama-server/**"
      - "data/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

jobs:
  check:
    name: Build Nakama runtime module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build --workspace=nakama-server

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci

      - name: Rebuild Nakama module
        run: npm run build --workspace=nakama-server

      - name: Stage Nakama module bundle
        run: |
          mkdir -p deploy/nakama-modules
          cp nakama-server/build/index.js deploy/nakama-modules/index.js

      - name: Sync deploy assets to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy"
          target: "/srv/gg-staging"
          rm: true

      - name: Apply on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NAKAMA_CONSOLE_PASSWORD: ${{ secrets.NAKAMA_CONSOLE_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_PASSWORD,NAKAMA_CONSOLE_PASSWORD
          script: |
            set -e
            rm -rf /srv/gg/nakama-modules
            mkdir -p /srv/gg
            cp -r /srv/gg-staging/deploy/nakama-modules /srv/gg/nakama-modules
            cp /srv/gg-staging/deploy/Caddyfile /srv/gg/Caddyfile
            cp /srv/gg-staging/deploy/docker-compose.yml /srv/gg/docker-compose.yml
            rm -rf /srv/gg-staging
            umask 077
            cat > /srv/gg/.env <<ENVEOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            NAKAMA_CONSOLE_PASSWORD=${NAKAMA_CONSOLE_PASSWORD:-${POSTGRES_PASSWORD}}
            ENVEOF
            cd /srv/gg
            # --remove-orphans убьёт старые контейнеры (Phaser server/client/postgres)
            # которых больше нет в compose.
            docker compose up -d --remove-orphans
            docker exec gg-caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
            docker compose restart nakama
            docker image prune -f
            docker compose ps
