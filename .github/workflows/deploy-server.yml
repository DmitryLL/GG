name: Deploy server to VPS

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "client/**"
      - "shared/**"
      - "deploy/**"
      - "nakama-server/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

jobs:
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: cd server && npx prisma generate
      - run: npx tsc --noEmit --project shared/tsconfig.json
      - run: npx tsc --noEmit --project server/tsconfig.json
      - run: npm run build --workspace=nakama-server

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild Nakama module
        run: npm run build --workspace=nakama-server

      - name: Stage Nakama module bundle
        run: |
          mkdir -p deploy/nakama-modules
          cp nakama-server/build/index.js deploy/nakama-modules/index.js

      - name: Sync sources to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server,client,shared,deploy,package.json,package-lock.json"
          target: "/srv/gg-staging"
          rm: true

      - name: Build & restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NAKAMA_CONSOLE_PASSWORD: ${{ secrets.NAKAMA_CONSOLE_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_PASSWORD,JWT_SECRET,NAKAMA_CONSOLE_PASSWORD
          script: |
            set -e
            rm -rf /srv/gg/server /srv/gg/client /srv/gg/shared /srv/gg/nakama-modules
            mkdir -p /srv/gg
            cp -r /srv/gg-staging/server /srv/gg/server
            cp -r /srv/gg-staging/client /srv/gg/client
            cp -r /srv/gg-staging/shared /srv/gg/shared
            cp -r /srv/gg-staging/deploy/nakama-modules /srv/gg/nakama-modules
            cp /srv/gg-staging/package.json /srv/gg/package.json
            cp /srv/gg-staging/package-lock.json /srv/gg/package-lock.json
            cp /srv/gg-staging/deploy/Caddyfile /srv/gg/Caddyfile
            cp /srv/gg-staging/deploy/docker-compose.yml /srv/gg/docker-compose.yml
            rm -rf /srv/gg-staging
            umask 077
            cat > /srv/gg/.env <<ENVEOF
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            NAKAMA_CONSOLE_PASSWORD=${NAKAMA_CONSOLE_PASSWORD:-${POSTGRES_PASSWORD}}
            ENVEOF
            cd /srv/gg
            docker compose up -d --build
            docker exec gg-caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
            # Nakama only loads runtime modules on boot; restart to pick up a fresh build/index.js.
            docker compose restart nakama
            docker image prune -f
            docker compose ps
