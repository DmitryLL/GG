name: Deploy server to VPS

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "shared/**"
      - "deploy/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

jobs:
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit --project server/tsconfig.json
      - run: npx tsc --noEmit --project shared/tsconfig.json

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync sources to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server,shared,deploy,package.json,package-lock.json"
          target: "/srv/gg-staging"
          rm: true

      - name: Build & restart on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            rm -rf /srv/gg/server /srv/gg/shared
            mkdir -p /srv/gg
            cp -r /srv/gg-staging/server /srv/gg/server
            cp -r /srv/gg-staging/shared /srv/gg/shared
            cp /srv/gg-staging/package.json /srv/gg/package.json
            cp /srv/gg-staging/package-lock.json /srv/gg/package-lock.json
            cp /srv/gg-staging/deploy/Caddyfile /srv/gg/Caddyfile
            cp /srv/gg-staging/deploy/docker-compose.yml /srv/gg/docker-compose.yml
            rm -rf /srv/gg-staging
            cd /srv/gg
            docker compose up -d --build
            docker image prune -f
            docker compose ps
