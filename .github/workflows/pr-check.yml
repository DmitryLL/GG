name: PR checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build --workspace=nakama-server

  godot-import:
    name: Godot (parse client)
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.4"
      GODOT_TAG: "4.4-stable"
    steps:
      - uses: actions/checkout@v4
      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: /opt/godot
          key: godot-${{ env.GODOT_TAG }}
      - name: Install Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p /opt/godot
          wget -q -O /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_TAG}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /opt/godot
          mv /opt/godot/Godot_v${GODOT_TAG}_linux.x86_64 /opt/godot/godot
          chmod +x /opt/godot/godot
      - name: Sync world map
        run: |
          mkdir -p godot/assets
          cp data/maps/world.tmj godot/assets/world.tmj
      - name: Godot headless import (catches parse errors)
        run: |
          cd godot
          /opt/godot/godot --headless --import --verbose 2>&1 | tee /tmp/import.log
          if grep -qE "SCRIPT ERROR|Parse Error|Compile Error" /tmp/import.log; then
            echo "::error::Godot parse/compile errors found"
            exit 1
          fi
