<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GG</title>
    <style>
      body { margin: 0; background: #111; color: #ccc; font-family: system-ui, sans-serif; }
      #game { display: block; margin: 0 auto; }
      #info { position: fixed; top: 8px; left: 8px; font-size: 12px; z-index: 10; }
      #logout { position: fixed; top: 8px; right: 8px; z-index: 10; font-size: 12px; background: #333; color: #ccc; border: 1px solid #555; padding: 4px 8px; cursor: pointer; border-radius: 3px; }

      #auth-overlay {
        position: fixed; inset: 0;
        background: #111;
        display: flex; align-items: center; justify-content: center;
        z-index: 20;
      }
      #auth-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 24px;
        width: 300px;
      }
      #auth-card h1 { margin: 0 0 16px; font-size: 20px; color: #eee; }
      #auth-card input {
        width: 100%; padding: 8px; margin-bottom: 8px;
        background: #222; color: #eee; border: 1px solid #444; border-radius: 3px;
        box-sizing: border-box; font-size: 14px;
      }
      #auth-card button {
        width: 100%; padding: 8px; margin-top: 4px;
        background: #2a4a2a; color: #eee; border: 1px solid #3a6a3a;
        border-radius: 3px; cursor: pointer; font-size: 14px;
      }
      #auth-card button:hover { background: #3a6a3a; }
      #auth-card button.secondary { background: #222; border-color: #444; }
      #auth-error { color: #e66; font-size: 12px; min-height: 16px; margin-top: 8px; }

      #chat {
        position: fixed; bottom: 8px; left: 8px; z-index: 10;
        width: 320px; max-width: calc(100vw - 16px);
        display: flex; flex-direction: column; gap: 4px;
        font-size: 13px; pointer-events: none;
      }
      #chat-log {
        display: flex; flex-direction: column; gap: 2px;
        max-height: 160px; overflow: hidden;
      }
      #chat-log .msg {
        background: rgba(0,0,0,0.55);
        padding: 3px 8px; border-radius: 3px;
        color: #eee; line-height: 1.35;
        word-break: break-word;
      }
      #chat-log .msg .who { color: #9ae; margin-right: 6px; }
      #chat-input {
        pointer-events: auto;
        background: rgba(0,0,0,0.7);
        color: #eee; border: 1px solid #444; border-radius: 3px;
        padding: 6px 8px; font-size: 13px; font-family: inherit;
        outline: none;
      }
      #chat-input:focus { border-color: #8a8; }
      #chat-input.idle { opacity: 0.55; }

      #hud {
        position: fixed; top: 40px; right: 8px; z-index: 10;
        display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        font-family: system-ui, sans-serif; color: #eee;
      }
      #gold { font-size: 13px; color: #fde68a; }
      .eq-row { display: flex; gap: 4px; align-items: center; }
      .eq-label { font-size: 10px; color: #888; width: 18px; text-align: right; }
      #inv {
        display: grid; grid-template-columns: repeat(6, 36px); gap: 4px;
      }
      .inv-slot, .eq-slot {
        width: 36px; height: 36px;
        background: rgba(0,0,0,0.6);
        border: 1px solid #333;
        border-radius: 3px;
        position: relative;
        image-rendering: pixelated;
        cursor: pointer;
      }
      .inv-slot.equippable { border-color: #6b7280; }
      .inv-slot:hover, .eq-slot:hover { border-color: #8a8; }
      .eq-slot.empty { opacity: 0.4; cursor: default; }
      .inv-slot .icon {
        width: 28px; height: 28px;
        margin: 3px auto 0;
        display: block;
        image-rendering: pixelated;
      }
      .inv-slot .qty {
        position: absolute; right: 2px; bottom: 0;
        font-size: 10px; color: #fff;
        text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
      }
    </style>
  </head>
  <body>
    <div id="auth-overlay">
      <div id="auth-card">
        <h1 id="auth-title">Вход</h1>
        <input id="auth-email" type="email" placeholder="email" autocomplete="email" />
        <input id="auth-password" type="password" placeholder="пароль (6+ символов)" autocomplete="current-password" />
        <button id="auth-submit">Войти</button>
        <button id="auth-toggle" class="secondary" type="button">Нет аккаунта? Регистрация</button>
        <div id="auth-error"></div>
      </div>
    </div>

    <button id="logout" style="display:none">Выйти</button>
    <div id="hud" style="display:none">
      <div id="gold">0 зол.</div>
      <div class="eq-row"><span class="eq-label">Оруж.</span><div id="eq-weapon" class="eq-slot empty"></div></div>
      <div class="eq-row"><span class="eq-label">Броня</span><div id="eq-armor" class="eq-slot empty"></div></div>
      <div id="inv"></div>
    </div>
    <div id="game"></div>
    <div id="chat" style="display:none">
      <div id="chat-log"></div>
      <input id="chat-input" class="idle" type="text" maxlength="140" placeholder="Enter — написать" />
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
