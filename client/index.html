<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GG</title>
    <style>
      :root {
        --hud-w: 240px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: #111;
        color: #ccc;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }

      #logout {
        position: fixed; top: 8px; right: 8px; z-index: 30;
        font-size: 12px; background: #333; color: #ccc;
        border: 1px solid #555; padding: 4px 8px;
        cursor: pointer; border-radius: 3px;
      }

      #stage {
        display: flex; flex-direction: row;
        align-items: flex-start; justify-content: center;
        gap: 12px; padding: 12px;
        width: 100%;
        min-height: 100vh;
      }

      #game-col {
        position: relative;
        width: min(800px, 100vw - 24px);
        max-height: calc(100vh - 24px);
        display: flex; flex-direction: column; gap: 6px;
      }
      #game {
        position: relative;
        width: 100%;
        aspect-ratio: 800 / 608;
        background: #000;
        border-radius: 3px;
        overflow: hidden;
      }
      #game canvas { display: block; width: 100% !important; height: 100% !important; }

      /* Chat — overlay inside game-col, bottom-left */
      #chat {
        position: absolute; left: 6px; bottom: 6px;
        width: min(300px, calc(100% - 16px));
        display: flex; flex-direction: column; gap: 3px;
        font-size: 12px; z-index: 5; pointer-events: none;
      }
      #chat-log {
        display: flex; flex-direction: column; gap: 2px;
        max-height: 140px; overflow: hidden;
      }
      #chat-log .msg {
        background: rgba(0,0,0,0.6);
        padding: 2px 7px; border-radius: 3px;
        color: #eee; line-height: 1.3; word-break: break-word;
      }
      #chat-log .msg .who { color: #9ae; margin-right: 5px; }
      #chat-input {
        pointer-events: auto;
        background: rgba(0,0,0,0.75);
        color: #eee; border: 1px solid #444; border-radius: 3px;
        padding: 5px 8px; font-size: 12px; font-family: inherit;
        outline: none; width: 100%;
      }
      #chat-input:focus { border-color: #8a8; }
      #chat-input.idle { opacity: 0.55; }

      /* HUD column — right of canvas on desktop */
      #hud {
        display: flex; flex-direction: column; gap: 8px;
        width: var(--hud-w); flex-shrink: 0;
        color: #eee; font-family: system-ui, sans-serif;
      }
      #gold { font-size: 13px; color: #fde68a; text-align: right; }
      .eq-row { display: flex; gap: 6px; align-items: center; justify-content: flex-end; }
      .eq-label { font-size: 11px; color: #888; }
      #inv { display: grid; grid-template-columns: repeat(6, 36px); gap: 4px; justify-content: end; }

      .inv-slot, .eq-slot {
        width: 36px; height: 36px;
        background: rgba(0,0,0,0.6);
        border: 1px solid #333; border-radius: 3px;
        position: relative; image-rendering: pixelated;
        cursor: pointer;
      }
      .inv-slot.equippable { border-color: #6b7280; }
      .inv-slot:hover, .eq-slot:hover { border-color: #8a8; }
      .eq-slot.empty { opacity: 0.4; cursor: default; }
      .inv-slot .icon {
        width: 28px; height: 28px; margin: 3px auto 0;
        display: block; image-rendering: pixelated;
      }
      .inv-slot .qty {
        position: absolute; right: 2px; bottom: 0;
        font-size: 10px; color: #fff;
        text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
      }

      /* Auth overlay */
      #auth-overlay {
        position: fixed; inset: 0; background: #111;
        display: flex; align-items: center; justify-content: center;
        z-index: 40; padding: 16px;
      }
      #auth-card {
        background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
        padding: 24px; width: 100%; max-width: 320px;
      }
      #auth-card h1 { margin: 0 0 16px; font-size: 20px; color: #eee; }
      #auth-card input {
        width: 100%; padding: 8px; margin-bottom: 8px;
        background: #222; color: #eee; border: 1px solid #444; border-radius: 3px;
        font-size: 14px;
      }
      #auth-card button {
        width: 100%; padding: 8px; margin-top: 4px;
        background: #2a4a2a; color: #eee; border: 1px solid #3a6a3a;
        border-radius: 3px; cursor: pointer; font-size: 14px;
      }
      #auth-card button:hover { background: #3a6a3a; }
      #auth-card button.secondary { background: #222; border-color: #444; }
      #auth-error { color: #e66; font-size: 12px; min-height: 16px; margin-top: 8px; }

      /* Shop overlay */
      #shop-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.7);
        z-index: 50; display: none; align-items: center; justify-content: center;
        padding: 12px;
      }
      #shop-overlay.open { display: flex; }
      #shop-card {
        background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
        padding: 20px; width: 520px; max-width: 100%; max-height: 90vh;
        color: #eee; font-family: system-ui, sans-serif; font-size: 14px;
        display: flex; flex-direction: column; gap: 12px;
        overflow-y: auto;
      }
      #shop-card h2 { margin: 0; font-size: 18px; }
      #shop-card .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      #shop-card .col h3 { margin: 0 0 6px; font-size: 13px; color: #aaa; font-weight: 500; }
      #shop-card .entries { display: flex; flex-direction: column; gap: 4px; }
      #shop-card .entry {
        display: flex; align-items: center; gap: 8px;
        padding: 6px; border-radius: 3px; cursor: pointer;
        background: #222; border: 1px solid #333;
      }
      #shop-card .entry:hover { border-color: #6a6; background: #2a2a2a; }
      #shop-card .entry.disabled { opacity: 0.4; cursor: not-allowed; }
      #shop-card .entry.disabled:hover { border-color: #333; background: #222; }
      #shop-card .entry .icon { width: 28px; height: 28px; image-rendering: pixelated; flex-shrink: 0; }
      #shop-card .entry .name { flex: 1; }
      #shop-card .entry .price { color: #fde68a; }
      #shop-top { display: flex; justify-content: space-between; align-items: center; }
      #shop-close {
        background: #333; color: #eee; border: 1px solid #555;
        padding: 4px 10px; cursor: pointer; border-radius: 3px;
      }
      #shop-card .empty-msg { color: #777; font-style: italic; padding: 8px; font-size: 12px; }

      /* Mobile: stack HUD under canvas, shrink widths */
      @media (max-width: 900px) {
        #stage { flex-direction: column; align-items: center; padding: 6px; gap: 6px; }
        #game-col { max-height: none; }
        #hud {
          width: min(800px, 100vw - 12px);
          flex-direction: row; flex-wrap: wrap;
          justify-content: center; align-items: center;
          gap: 6px; padding: 4px;
          background: rgba(0,0,0,0.25); border-radius: 4px;
        }
        #gold { text-align: center; width: auto; margin-right: 8px; }
        .eq-row { gap: 4px; }
        .eq-label { display: none; }
        #inv { grid-template-columns: repeat(6, 34px); gap: 3px; justify-content: center; }
        .inv-slot, .eq-slot { width: 34px; height: 34px; }
        .inv-slot .icon { width: 26px; height: 26px; }
        #chat { font-size: 11px; width: min(240px, calc(100% - 14px)); }
        #chat-log { max-height: 90px; }
        #shop-card .cols { grid-template-columns: 1fr; }
      }
      @media (max-width: 380px) {
        #inv { grid-template-columns: repeat(6, 30px); }
        .inv-slot, .eq-slot { width: 30px; height: 30px; }
        .inv-slot .icon { width: 22px; height: 22px; }
      }
    </style>
  </head>
  <body>
    <div id="auth-overlay">
      <div id="auth-card">
        <h1 id="auth-title">Вход</h1>
        <input id="auth-email" type="email" placeholder="email" autocomplete="email" />
        <input id="auth-password" type="password" placeholder="пароль (6+ символов)" autocomplete="current-password" />
        <button id="auth-submit">Войти</button>
        <button id="auth-toggle" class="secondary" type="button">Нет аккаунта? Регистрация</button>
        <div id="auth-error"></div>
      </div>
    </div>

    <button id="logout" style="display:none">Выйти</button>

    <div id="shop-overlay">
      <div id="shop-card">
        <div id="shop-top">
          <h2 id="shop-title">Торговец</h2>
          <button id="shop-close" type="button">×</button>
        </div>
        <div class="cols">
          <div class="col">
            <h3>Купить</h3>
            <div id="shop-buy" class="entries"></div>
          </div>
          <div class="col">
            <h3>Продать</h3>
            <div id="shop-sell" class="entries"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="stage">
      <div id="game-col">
        <div id="game"></div>
        <div id="chat" style="display:none">
          <div id="chat-log"></div>
          <input id="chat-input" class="idle" type="text" maxlength="140" placeholder="Enter — написать" />
        </div>
      </div>
      <div id="hud" style="display:none">
        <div id="gold">0 зол.</div>
        <div class="eq-row"><span class="eq-label">Оруж.</span><div id="eq-weapon" class="eq-slot empty"></div></div>
        <div class="eq-row"><span class="eq-label">Броня</span><div id="eq-armor" class="eq-slot empty"></div></div>
        <div id="inv"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
