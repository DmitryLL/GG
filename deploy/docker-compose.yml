services:
  postgres:
    image: postgres:16-alpine
    container_name: gg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gg
      POSTGRES_DB: gg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gg -d gg"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gg

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: gg-server
    restart: unless-stopped
    environment:
      PORT: "2567"
      NODE_ENV: production
      DATABASE_URL: postgresql://gg:${POSTGRES_PASSWORD}@postgres:5432/gg
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "2567"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gg

  caddy:
    image: caddy:2-alpine
    container_name: gg-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    networks:
      - gg

networks:
  gg:

volumes:
  pg_data:
  caddy_data:
  caddy_config:
