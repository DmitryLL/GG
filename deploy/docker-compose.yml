services:
  nakama-postgres:
    image: postgres:16-alpine
    container_name: gg-nakama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nakama
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - nakama_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gg

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: gg-nakama
    restart: unless-stopped
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address nakama:${POSTGRES_PASSWORD}@nakama-postgres:5432/nakama
        && exec /nakama/nakama
        --name nakama1
        --database.address nakama:${POSTGRES_PASSWORD}@nakama-postgres:5432/nakama
        --logger.level INFO
        --session.token_expiry_sec 7200
        --console.username admin
        --console.password ${NAKAMA_CONSOLE_PASSWORD}
        --runtime.path /nakama/data/modules
    depends_on:
      nakama-postgres:
        condition: service_healthy
    expose:
      - "7349"
      - "7350"
      - "7351"
    volumes:
      - ./nakama-modules:/nakama/data/modules:ro
    networks:
      - gg

  caddy:
    image: caddy:2-alpine
    container_name: gg-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /srv/gg-godot:/srv-godot:ro
    depends_on:
      nakama:
        condition: service_started
    networks:
      - gg

networks:
  gg:

volumes:
  caddy_data:
  caddy_config:
  nakama_pg_data:
