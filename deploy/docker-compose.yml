services:
  postgres:
    image: postgres:16-alpine
    container_name: gg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gg
      POSTGRES_DB: gg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gg -d gg"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gg

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: gg-server
    restart: unless-stopped
    environment:
      PORT: "2567"
      NODE_ENV: production
      DATABASE_URL: postgresql://gg:${POSTGRES_PASSWORD}@postgres:5432/gg
      JWT_SECRET: ${JWT_SECRET}
    expose:
      - "2567"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gg

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: gg-client
    restart: "no"
    volumes:
      - client_dist:/out
    networks:
      - gg

  nakama-postgres:
    image: postgres:16-alpine
    container_name: gg-nakama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nakama
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - nakama_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama -d nakama"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gg

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: gg-nakama
    restart: unless-stopped
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address nakama:${POSTGRES_PASSWORD}@nakama-postgres:5432/nakama
        && exec /nakama/nakama
        --name nakama1
        --database.address nakama:${POSTGRES_PASSWORD}@nakama-postgres:5432/nakama
        --logger.level INFO
        --session.token_expiry_sec 7200
        --console.username admin
        --console.password ${NAKAMA_CONSOLE_PASSWORD}
        --runtime.path /nakama/data/modules
    depends_on:
      nakama-postgres:
        condition: service_healthy
    expose:
      - "7349"
      - "7350"
      - "7351"
    volumes:
      - ./nakama-modules:/nakama/data/modules:ro
    networks:
      - gg

  caddy:
    image: caddy:2-alpine
    container_name: gg-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - client_dist:/srv:ro
    depends_on:
      client:
        condition: service_completed_successfully
      server:
        condition: service_started
      nakama:
        condition: service_started
    networks:
      - gg

networks:
  gg:

volumes:
  pg_data:
  caddy_data:
  caddy_config:
  client_dist:
  nakama_pg_data:
